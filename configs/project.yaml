project:
  name: log-anomaly-mlops
  version: 0.7.0

problem:
  type: anomaly_detection
  unit: log_line
  target_metric: precision_at_k
  k: 100
  anomaly_threshold: 0.5

data:
  source: sample
  raw_dir: data/raw
  processed_dir: data/processed
  sample_file: data/raw/sample.jsonl
  hdfs_file: data/raw/HDFS_2k.log_structured.csv
  hdfs_url: https://raw.githubusercontent.com/logpai/loghub/master/HDFS/HDFS_2k.log_structured.csv
  parsed_sample_file: data/processed/parsed_sample.jsonl
  parsed_hdfs_file: data/processed/parsed_hdfs.jsonl
  sample_size: 50000

schema:
  required_fields:
    - timestamp
    - level
    - message
  optional_fields:
    - service
    - trace_id
  parsed_fields:
    - template
    - event_id

parser:
  engine: drain3
  sim_threshold: 0.4
  depth: 4
  max_children: 100
  state_file: models/drain3_hdfs.bin

baseline:
  error_score: 0.8
  normal_score: 0.1

baseline_v2:
  rare_count_threshold: 2
  rare_score: 0.85
  error_score: 0.65
  normal_score: 0.1

features:
  rare_count_threshold: 2
  tfidf_max_features: 50
  test_size: 0.2
  random_seed: 42
  builder_file: models/feature_builder.joblib
  features_meta_file: data/processed/features_meta.json
  features_npz_file: data/processed/features_hdfs.npz

model:
  type: isolation_forest
  n_estimators: 100
  contamination: 0.05
  random_seed: 42
  model_file: models/anomaly_model.joblib
  predictions_file: data/processed/predictions_test.jsonl
  metrics_file: data/processed/train_metrics.json

mlflow:
  tracking_uri: sqlite:///mlruns/mlflow.db
  experiment_name: log-anomaly-mlops
  registered_model_name: log-anomaly-detector
  run_name: isolation-forest-hdfs
  promote_to_staging: true
  prediction_sample_size: 20

serving:
  host: 127.0.0.1
  port: 8000
  source: mlflow
  model_stage: Staging
